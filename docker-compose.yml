services:
  db:
    image: postgres:16-alpine
    container_name: healthwyz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthwyz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthwyz_secret}
      POSTGRES_DB: healthwyz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthwyz"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: healthwyz-app:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3000}
    container_name: healthwyz-app
    restart: unless-stopped
    ports:
      - "3000:8080"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
