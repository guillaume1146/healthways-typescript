name: Build, Test & Deploy to Oracle Cloud VM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Lint & Type Check ────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

  # ─── Unit Tests ────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Run unit tests
        run: npx vitest run

  # ─── Build & Deploy ────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy to Oracle Cloud VM
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          IMAGE_TAG=$(echo "$IMAGE_TAG" | tr '[:upper:]' '[:lower:]')
          docker build -t $IMAGE_TAG \
            --build-arg NEXT_PUBLIC_APP_URL=https://${{ secrets.OCI_VM_IP }} \
            --build-arg NEXT_PUBLIC_SOCKET_URL=https://${{ secrets.OCI_VM_IP }} \
            .
          docker push $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: GH_TOKEN,GH_ACTOR,IMAGE_TAG
          script: |
            cd ~/healthways-typescript
            git pull origin main

            # Free disk space before pulling
            docker image prune -af 2>/dev/null || true

            # Login to GHCR and pull the image
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker pull "$IMAGE_TAG"

            # Tag as healthwyz-app:latest for docker-compose
            docker tag "$IMAGE_TAG" healthwyz-app:latest

            # Restart with the new image
            docker compose up -d

            # Wait for app to be ready
            sleep 10

            # Apply any schema changes
            docker compose exec -T app npx prisma db push --accept-data-loss 2>/dev/null || true

            echo "✅ Deployment complete"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          script: |
            curl -sk https://localhost/api/auth/me 2>/dev/null && echo "✅ App responding on HTTPS" || curl -s http://localhost:3000 > /dev/null && echo "✅ App responding on HTTP" || echo "❌ App not responding"
            docker ps --format "table {{.Names}}\t{{.Status}}" | grep healthwyz
