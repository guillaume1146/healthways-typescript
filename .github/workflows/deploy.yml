name: Build, Test & Deploy to Oracle Cloud VM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Type Check ────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

  # ─── Unit Tests ────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Run unit tests
        run: npx vitest run

  # ─── Build & Deploy ────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy to Oracle Cloud VM
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t healthwyz-app:latest \
            --build-arg NEXT_PUBLIC_APP_URL=https://${{ secrets.OCI_VM_IP }} \
            --build-arg NEXT_PUBLIC_SOCKET_URL=https://${{ secrets.OCI_VM_IP }} \
            .

      - name: Save Docker image
        run: docker save healthwyz-app:latest | gzip > healthwyz-app.tar.gz

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keyscan -H ${{ secrets.OCI_VM_IP }} >> ~/.ssh/known_hosts

      - name: Transfer image to VM
        run: |
          scp -i ~/.ssh/oci_key \
            healthwyz-app.tar.gz \
            ${{ secrets.OCI_VM_USER }}@${{ secrets.OCI_VM_IP }}:/tmp/healthwyz-app.tar.gz

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            cd ~/healthways-typescript
            git pull origin main

            # Load the pre-built image
            docker load < /tmp/healthwyz-app.tar.gz
            rm /tmp/healthwyz-app.tar.gz

            # Restart with the new image (no --build, uses loaded image)
            docker compose up -d

            # Wait for app to be ready
            sleep 10

            # Apply any schema changes
            docker compose exec -T app npx prisma db push --accept-data-loss 2>/dev/null || true

            echo "✅ Deployment complete"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          script: |
            curl -sf http://localhost:3000 > /dev/null && echo "✅ App is responding" || echo "❌ App not responding"
            docker ps --format "table {{.Names}}\t{{.Status}}" | grep healthwyz
