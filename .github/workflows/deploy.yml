name: Build, Test & Deploy to Oracle Cloud VM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Lint & Type Check ────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

  # ─── Unit Tests ────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Run unit tests
        run: npx vitest run

  # ─── Build & Deploy ────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy to Oracle Cloud VM
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          IMAGE_TAG=$(echo "$IMAGE_TAG" | tr '[:upper:]' '[:lower:]')
          DOMAIN="${{ secrets.APP_DOMAIN }}"
          APP_URL="https://${DOMAIN:-${{ secrets.OCI_VM_IP }}}"
          docker build -t $IMAGE_TAG \
            --build-arg NEXT_PUBLIC_APP_URL=$APP_URL \
            --build-arg NEXT_PUBLIC_SOCKET_URL=$APP_URL \
            .
          docker push $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: GH_TOKEN,GH_ACTOR,IMAGE_TAG
          script: |
            cd ~/healthways-typescript
            git pull origin main

            # Free RAM: drop kernel caches
            sudo sh -c 'echo 3 > /proc/sys/vm/drop_caches' 2>/dev/null || true

            # Remove only dangling images (keep layer cache for fast pulls)
            docker image prune -f 2>/dev/null || true

            # Login to GHCR and pull the image
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker pull "$IMAGE_TAG"

            # Tag as healthwyz-app:latest for docker-compose
            docker tag "$IMAGE_TAG" healthwyz-app:latest

            # Restart with the pre-built image (--no-build prevents rebuilding from Dockerfile)
            docker compose up -d --no-build

            # Wait for app to be ready (Next.js takes time on 1GB RAM)
            echo "Waiting for app to start..."
            for i in $(seq 1 12); do
              sleep 10
              if curl -s http://localhost:3000 > /dev/null 2>&1; then
                echo "App is ready after ${i}0 seconds"
                break
              fi
              echo "Still waiting... (${i}0s)"
            done

            # Apply any schema changes
            docker compose exec -T app npx prisma db push --accept-data-loss 2>/dev/null || true

            # Clean up old images now that app is running
            docker image prune -f 2>/dev/null || true

            echo "Deployment complete"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Setup HTTPS with Let's Encrypt
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          command_timeout: 15m
          envs: APP_DOMAIN
          script: |
            # Skip if no domain configured or cert already exists
            if [ -z "$APP_DOMAIN" ]; then
              echo "No APP_DOMAIN set, skipping HTTPS setup"
              exit 0
            fi

            if [ -f "/etc/letsencrypt/live/$APP_DOMAIN/fullchain.pem" ]; then
              echo "Certificate already exists for $APP_DOMAIN"
              exit 0
            fi

            echo "Setting up Let's Encrypt for $APP_DOMAIN..."

            # Install certbot if not present
            if ! which certbot > /dev/null 2>&1; then
              sudo apt-get update -qq
              sudo apt-get install -y -qq certbot python3-certbot-nginx
            fi

            # Update nginx server_name (handle both _ and the IP)
            sudo sed -i "s/server_name .*;/server_name $APP_DOMAIN;/g" /etc/nginx/sites-enabled/healthwyz

            # Reload nginx for the domain change
            sudo nginx -t && sudo systemctl reload nginx

            # Get certificate (non-interactive)
            sudo certbot --nginx -d "$APP_DOMAIN" --non-interactive --agree-tos --email healthwyz@duckdns.org --redirect

            echo "HTTPS certificate installed for $APP_DOMAIN"
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}

      - name: Update app environment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          command_timeout: 5m
          envs: APP_DOMAIN
          script: |
            if [ -z "$APP_DOMAIN" ]; then exit 0; fi

            cd ~/healthways-typescript

            # Update .env with domain
            sed -i "s|NEXT_PUBLIC_APP_URL=.*|NEXT_PUBLIC_APP_URL=https://$APP_DOMAIN|" .env
            sed -i "s|NEXT_PUBLIC_SOCKET_URL=.*|NEXT_PUBLIC_SOCKET_URL=https://$APP_DOMAIN|" .env

            echo "✅ Environment updated to use $APP_DOMAIN"
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          envs: APP_DOMAIN
          script: |
            DOMAIN="${APP_DOMAIN:-localhost}"
            curl -sk "https://$DOMAIN/api/auth/me" 2>/dev/null && echo "✅ App responding on HTTPS" || curl -s http://localhost:3000 > /dev/null && echo "✅ App responding on HTTP" || echo "❌ App not responding"
            docker ps --format "table {{.Names}}\t{{.Status}}" | grep healthwyz
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
