name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Lint & Type Check ────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

  # ─── Unit Tests ────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Run unit tests
        run: npx vitest run

  # ─── Build Docker Image ──────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          IMAGE_TAG=$(echo "$IMAGE_TAG" | tr '[:upper:]' '[:lower:]')
          DOMAIN="${{ secrets.VULTR_DOMAIN }}"
          if [ -n "$DOMAIN" ]; then
            APP_URL="https://$DOMAIN"
          else
            APP_URL="http://${{ secrets.VULTR_VM_IP }}"
          fi
          docker build -t $IMAGE_TAG \
            --build-arg NEXT_PUBLIC_APP_URL=$APP_URL \
            --build-arg NEXT_PUBLIC_SOCKET_URL=$APP_URL \
            .
          docker push $IMAGE_TAG
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ─── Deploy to Vultr (Primary) ─────────────────────────────────────
  deploy-vultr:
    name: Deploy to Vultr
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy on Vultr VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VULTR_VM_IP }}
          username: ${{ secrets.VULTR_VM_USER }}
          key: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: GH_TOKEN,GH_ACTOR,IMAGE_TAG
          script: |
            cd ~/healthtech-app

            # Pull latest code (for docker-compose.yml, prisma, seeds, etc.)
            git pull origin main 2>/dev/null || true

            # Remove dangling images
            docker image prune -f 2>/dev/null || true

            # Login to GHCR and pull the image
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker pull "$IMAGE_TAG"

            # Tag as healthwyz-app:latest for docker-compose
            docker tag "$IMAGE_TAG" healthwyz-app:latest

            # Restart with the pre-built image
            docker compose up -d --no-build

            # Wait for app to be ready
            echo "Waiting for app to start..."
            for i in $(seq 1 24); do
              sleep 5
              if curl -s http://localhost:3000 > /dev/null 2>&1; then
                echo "App is ready after $((i * 5)) seconds"
                break
              fi
              echo "Still waiting... ($((i * 5))s)"
            done

            # Apply schema changes
            docker compose exec -T app npx prisma db push --accept-data-loss

            # Seed the database (idempotent — cleans and re-seeds)
            docker compose exec -T app sh -c "ts-node --transpile-only --compiler-options '{\"module\":\"CommonJS\"}' prisma/seed.ts"

            # Clean up old images
            docker image prune -f 2>/dev/null || true

            echo "Deployment complete with seed data"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}

      - name: Setup HTTPS with Let's Encrypt
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VULTR_VM_IP }}
          username: ${{ secrets.VULTR_VM_USER }}
          key: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}
          command_timeout: 15m
          envs: VULTR_DOMAIN
          script: |
            if [ -z "$VULTR_DOMAIN" ]; then
              echo "No VULTR_DOMAIN set, skipping HTTPS setup"
              exit 0
            fi

            if [ -f "/etc/letsencrypt/live/$VULTR_DOMAIN/fullchain.pem" ]; then
              echo "Certificate already exists for $VULTR_DOMAIN"
              exit 0
            fi

            echo "Setting up Let's Encrypt for $VULTR_DOMAIN..."

            if ! which certbot > /dev/null 2>&1; then
              sudo apt-get update -qq
              sudo apt-get install -y -qq certbot python3-certbot-nginx
            fi

            sudo sed -i "s/server_name .*;/server_name $VULTR_DOMAIN;/g" /etc/nginx/sites-enabled/healthwyz
            sudo nginx -t && sudo systemctl reload nginx

            sudo certbot --nginx -d "$VULTR_DOMAIN" --non-interactive --agree-tos --email healthwyz@duckdns.org --redirect

            echo "HTTPS certificate installed for $VULTR_DOMAIN"
        env:
          VULTR_DOMAIN: ${{ secrets.VULTR_DOMAIN }}

      - name: Verify Vultr deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VULTR_VM_IP }}
          username: ${{ secrets.VULTR_VM_USER }}
          key: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}
          envs: VULTR_DOMAIN
          script: |
            DOMAIN="${VULTR_DOMAIN:-localhost}"
            echo "=== Container Status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep healthwyz

            echo ""
            echo "=== Health Check ==="
            if curl -sk "https://$DOMAIN/api/auth/me" 2>/dev/null; then
              echo "App responding on HTTPS"
            elif curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "App responding on HTTP"
            else
              echo "WARNING: App not responding"
            fi

            echo ""
            echo "=== Memory Usage ==="
            free -h | head -2

            echo ""
            echo "=== Disk Usage ==="
            df -h / | tail -1
        env:
          VULTR_DOMAIN: ${{ secrets.VULTR_DOMAIN }}

